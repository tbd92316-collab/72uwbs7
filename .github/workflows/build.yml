name: Build YouTube Desktop App (.exe)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Create Project Files Automatically
      shell: bash
      run: |
        # 1. Initialize package.json with icon config
        cat << 'EOF' > package.json
        {
          "name": "youtube-desktop",
          "version": "1.0.0",
          "description": "YouTube Desktop Application",
          "author": "Your Name",
          "main": "main.js",
          "type": "commonjs",
          "scripts": {
            "build": "electron-builder --win"
          },
          "devDependencies": {
            "electron": "^28.0.0",
            "electron-builder": "^24.13.3"
          },
          "overrides": {
            "@noble/hashes": "1.3.2"
          },
          "build": {
            "appId": "com.youtube.desktop",
            "icon": "logo.png",
            "win": {
              "target": "nsis"
            },
            "publish": null
          }
        }
        EOF

        # 2. Create main.js (App code to load YouTube and set window icon)
        cat << 'EOF' > main.js
        const { app, BrowserWindow } = require('electron');
        const path = require('path');

        function createWindow() {
          const win = new BrowserWindow({
            width: 1200,
            height: 800,
            autoHideMenuBar: true,
            icon: path.join(__dirname, 'logo.png'), // Logo yahan se link hoga
            webPreferences: {
              nodeIntegration: false,
              contextIsolation: true
            }
          });

          win.loadURL('https://www.youtube.com');
        }

        app.whenReady().then(createWindow);

        app.on('window-all-closed', () => {
          if (process.platform !== 'darwin') app.quit();
        });
        EOF

    - name: Install Dependencies
      run: npm install

    - name: Build .exe Package
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: npm run build

    - name: Upload .exe Artifact
      uses: actions/upload-artifact@v4
      with:
        name: YouTube-Desktop-EXE
        path: dist/*.exe
